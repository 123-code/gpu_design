<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tiny-gpu · draw a digit</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:#0b0d12;
         color:#e6e9ef; display:flex; flex-direction:column; align-items:center; gap:18px; padding:28px; }
  h1 { font-size:18px; font-weight:600; margin:0; letter-spacing:.2px; }
  .sub { color:#8b93a7; font-size:13px; margin-top:-10px; }
  .row { display:flex; gap:24px; align-items:center; flex-wrap:wrap; justify-content:center; }
  #pad { background:#000; border-radius:14px; border:1px solid #232838; cursor:crosshair; touch-action:none; }
  .panel { display:flex; flex-direction:column; align-items:center; gap:10px; }
  #preview { width:112px; height:112px; image-rendering:pixelated; background:#000; border-radius:8px; border:1px solid #232838; }
  .label { font-size:11px; color:#8b93a7; text-transform:uppercase; letter-spacing:.08em; }
  .result { font-size:96px; font-weight:700; line-height:1; min-width:90px; text-align:center;
            color:#7cf3a0; }
  .result.idle { color:#2c3346; }
  .btns { display:flex; gap:10px; }
  button { font:inherit; font-size:14px; padding:10px 18px; border-radius:10px; border:1px solid #2a3145;
           background:#161b27; color:#e6e9ef; cursor:pointer; }
  button.primary { background:#2563eb; border-color:#2563eb; color:#fff; }
  button:active { transform:translateY(1px); }
  #status { font-size:12px; color:#8b93a7; min-height:16px; }
</style>
</head>
<body>
  <h1>Draw a digit → the FPGA reads it</h1>
  <div class="sub">tiny-gpu on a Tang Nano 20K runs the whole CNN on-chip</div>

  <div class="row">
    <canvas id="pad" width="280" height="280"></canvas>
    <div class="panel">
      <span class="label">what the GPU sees (28×28)</span>
      <canvas id="preview" width="28" height="28"></canvas>
    </div>
    <div class="panel">
      <span class="label">prediction</span>
      <div id="out" class="result idle">–</div>
    </div>
  </div>

  <div class="btns">
    <button id="go" class="primary">Recognize</button>
    <button id="clear">Clear</button>
  </div>
  <div id="status">draw a single digit (0–9), thick and centered</div>

<script>
const pad = document.getElementById('pad'), pctx = pad.getContext('2d');
const prev = document.getElementById('preview'), prevctx = prev.getContext('2d');
const out = document.getElementById('out'), statusEl = document.getElementById('status');

function clearPad(){ pctx.fillStyle='#000'; pctx.fillRect(0,0,280,280);
  prevctx.fillStyle='#000'; prevctx.fillRect(0,0,28,28);
  out.textContent='–'; out.classList.add('idle'); statusEl.textContent='draw a single digit (0–9)'; }
clearPad();

// --- drawing (white stroke on black) ---
let drawing=false, lastX=0, lastY=0;
function pos(e){ const r=pad.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
  return [(t.clientX-r.left)*pad.width/r.width, (t.clientY-r.top)*pad.height/r.height]; }
function start(e){ drawing=true; [lastX,lastY]=pos(e); e.preventDefault(); }
function move(e){ if(!drawing) return; const [x,y]=pos(e);
  pctx.strokeStyle='#fff'; pctx.lineWidth=22; pctx.lineCap='round'; pctx.lineJoin='round';
  pctx.beginPath(); pctx.moveTo(lastX,lastY); pctx.lineTo(x,y); pctx.stroke(); [lastX,lastY]=[x,y]; e.preventDefault(); }
function end(){ drawing=false; }
pad.addEventListener('mousedown',start); pad.addEventListener('mousemove',move);
window.addEventListener('mouseup',end);
pad.addEventListener('touchstart',start); pad.addEventListener('touchmove',move); pad.addEventListener('touchend',end);

// --- MNIST-style preprocessing: bounding box -> fit in 20x20 -> center in 28x28 ---
function to28(){
  const src = pctx.getImageData(0,0,280,280).data;
  let minX=280,minY=280,maxX=-1,maxY=-1;
  for(let y=0;y<280;y++) for(let x=0;x<280;x++){
    if(src[(y*280+x)*4] > 40){ if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; }
  }
  prevctx.fillStyle='#000'; prevctx.fillRect(0,0,28,28);
  if(maxX<0) return null;                                  // nothing drawn
  const w=maxX-minX+1, h=maxY-minY+1, scale=20/Math.max(w,h);
  const dw=Math.round(w*scale), dh=Math.round(h*scale);
  const dx=Math.round((28-dw)/2), dy=Math.round((28-dh)/2);
  prevctx.imageSmoothingEnabled=true;
  prevctx.drawImage(pad, minX,minY,w,h, dx,dy,dw,dh);      // crop+scale+center, antialiased
  const px=prevctx.getImageData(0,0,28,28).data, pixels=new Array(784);
  for(let i=0;i<784;i++) pixels[i]=px[i*4];                // red channel == intensity (white on black)
  return pixels;
}

document.getElementById('clear').onclick = clearPad;
document.getElementById('go').onclick = async () => {
  const pixels = to28();
  if(!pixels){ statusEl.textContent='draw something first'; return; }
  statusEl.textContent='sending 784 bytes to the FPGA…'; out.textContent='…'; out.classList.add('idle');
  try {
    const r = await fetch('/predict',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pixels})});
    const j = await r.json();
    if(j.error) throw new Error(j.error);
    out.textContent = j.digit; out.classList.remove('idle');
    statusEl.textContent = 'the GPU computed this entirely on-chip';
  } catch(e){ out.textContent='!'; statusEl.textContent='error: '+e.message; }
};
</script>
</body>
</html>
