<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="700" viewBox="0 0 1240 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .lbl  { fill:#0f172a; }
      .sub  { fill:#475569; font-size:11px; }
      .wire { stroke:#334155; stroke-width:1.6; fill:none; marker-end:url(#arr); }
      .blk  { rx:7; ry:7; stroke-width:1.6; }
      .ctrl { fill:#ede9fe; stroke:#7c3aed; }
      .mem  { fill:#fde68a; stroke:#d97706; }
      .sys  { fill:#dbeafe; stroke:#2563eb; }
      .comp { fill:#dcfce7; stroke:#16a34a; }
      .lane { fill:#ffffff; stroke:#94a3b8; }
    </style>
  </defs>

  <rect width="1240" height="700" fill="#ffffff"/>
  <text x="620" y="34" text-anchor="middle" font-size="24" font-weight="bold" class="lbl">core.sv — one SIMT compute core</text>
  <text x="620" y="56" text-anchor="middle" font-size="12" class="sub">4 threads/block · block names match src/*.sv · thread 0 is SIMT-uniform (drives stores, MACs &amp; emit)</text>

  <!-- external interfaces -->
  <rect x="40" y="80" width="250" height="48" class="blk ctrl"/>
  <text x="165" y="101" text-anchor="middle" font-size="13" class="lbl">dispatcher</text>
  <text x="165" y="118" text-anchor="middle" class="sub">start → core · done ← core</text>
  <rect x="330" y="80" width="300" height="48" class="blk mem"/>
  <text x="480" y="100" text-anchor="middle" font-size="13" class="lbl">program_memory</text>
  <text x="480" y="117" text-anchor="middle" class="sub">256×16 instruction ROM</text>
  <rect x="900" y="80" width="300" height="48" class="blk mem"/>
  <text x="1050" y="100" text-anchor="middle" font-size="13" class="lbl">main_memory</text>
  <text x="1050" y="117" text-anchor="middle" class="sub">8 KB dual-port BRAM (shared)</text>

  <!-- core box -->
  <rect x="30" y="150" width="1180" height="525" rx="12" ry="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="48" y="176" font-size="15" font-weight="bold" class="lbl">compute core · core.sv</text>

  <!-- scheduler + decoder -->
  <rect x="48" y="188" width="560" height="54" class="blk ctrl"/>
  <text x="328" y="210" text-anchor="middle" font-size="13" class="lbl">core_scheduler — warp FSM</text>
  <text x="328" y="228" text-anchor="middle" class="sub">FETCH→DECODE→REQUEST→WAIT→EXECUTE→UPDATE → core_state</text>
  <rect x="628" y="188" width="562" height="54" class="blk ctrl"/>
  <text x="909" y="210" text-anchor="middle" font-size="13" class="lbl">core_decoder</text>
  <text x="909" y="228" text-anchor="middle" class="sub">16-bit instruction → decoded_* control signals</text>

  <!-- control broadcast bus -->
  <text x="619" y="262" text-anchor="middle" class="sub">decoded_* control + core_state broadcast to all four lanes (SIMT lockstep)</text>
  <path d="M120,268 L1120,268" class="wire" style="marker-end:none"/>
  <path class="wire" d="M186,268 L186,278"/>
  <path class="wire" d="M474,268 L474,278"/>
  <path class="wire" d="M762,268 L762,278"/>
  <path class="wire" d="M1051,268 L1051,278"/>

  <!-- thread lane 0 (full detail) -->
  <rect x="48" y="280" width="276" height="224" class="blk lane"/>
  <text x="186" y="299" text-anchor="middle" font-size="12" font-weight="bold" class="lbl">thread lane 0</text>
  <text x="186" y="313" text-anchor="middle" class="sub">↳ also drives MACs · stores · emit</text>
  <rect x="60" y="320" width="252" height="40" class="blk lane" style="fill:#f8fafc"/>
  <text x="186" y="337" text-anchor="middle" font-size="12" class="lbl">registers</text>
  <text x="186" y="352" text-anchor="middle" class="sub">R0–R7, R13–R15 · R15 = %threadIdx</text>
  <rect x="60" y="366" width="252" height="40" class="blk lane" style="fill:#f8fafc"/>
  <text x="186" y="383" text-anchor="middle" font-size="12" class="lbl">alu</text>
  <text x="186" y="398" text-anchor="middle" class="sub">rs,rt → alu_out · sets N/Z/P</text>
  <rect x="60" y="412" width="252" height="40" class="blk lane" style="fill:#f8fafc"/>
  <text x="186" y="429" text-anchor="middle" font-size="12" class="lbl">lsu</text>
  <text x="186" y="444" text-anchor="middle" class="sub">load/store · rbase/wbase + off</text>
  <rect x="60" y="458" width="252" height="40" class="blk lane" style="fill:#f8fafc"/>
  <text x="186" y="475" text-anchor="middle" font-size="12" class="lbl">pc</text>
  <text x="186" y="490" text-anchor="middle" class="sub">next_pc · NZP branch</text>

  <!-- lanes 1-3 (condensed, identical) -->
  <rect x="336" y="280" width="276" height="224" class="blk lane"/>
  <text x="474" y="299" text-anchor="middle" font-size="12" font-weight="bold" class="lbl">thread lane 1</text>
  <text x="474" y="313" text-anchor="middle" class="sub">identical datapath to lane 0</text>
  <rect x="624" y="280" width="276" height="224" class="blk lane"/>
  <text x="762" y="299" text-anchor="middle" font-size="12" font-weight="bold" class="lbl">thread lane 2</text>
  <text x="762" y="313" text-anchor="middle" class="sub">identical datapath to lane 0</text>
  <rect x="912" y="280" width="278" height="224" class="blk lane"/>
  <text x="1051" y="299" text-anchor="middle" font-size="12" font-weight="bold" class="lbl">thread lane 3</text>
  <text x="1051" y="313" text-anchor="middle" class="sub">identical datapath to lane 0</text>

  <!-- condensed lane contents for 1-3 -->
  <text x="474" y="345" text-anchor="middle" font-size="11" class="lbl">registers · alu</text>
  <text x="474" y="367" text-anchor="middle" font-size="11" class="lbl">lsu · pc</text>
  <text x="762" y="345" text-anchor="middle" font-size="11" class="lbl">registers · alu</text>
  <text x="762" y="367" text-anchor="middle" font-size="11" class="lbl">lsu · pc</text>
  <text x="1051" y="345" text-anchor="middle" font-size="11" class="lbl">registers · alu</text>
  <text x="1051" y="367" text-anchor="middle" font-size="11" class="lbl">lsu · pc</text>

  <!-- shared core bus bar -->
  <rect x="48" y="512" width="1142" height="8" rx="4" fill="#cbd5e1"/>
  <path class="wire" d="M186,504 L186,512"/>
  <path class="wire" d="M474,504 L474,512"/>
  <path class="wire" d="M762,504 L762,512"/>
  <path class="wire" d="M1051,504 L1051,512"/>
  <path class="wire" d="M228,520 L228,560"/>
  <path class="wire" d="M610,520 L610,560"/>
  <path class="wire" d="M1000,520 L1000,560"/>

  <!-- functional units row -->
  <rect x="48" y="560" width="360" height="52" class="blk comp"/>
  <text x="228" y="582" text-anchor="middle" font-size="12" class="lbl">mac_array_3x3 (u_mac)</text>
  <text x="228" y="599" text-anchor="middle" class="sub">3×3 conv · baked int8 weights · DSP</text>
  <rect x="430" y="560" width="360" height="52" class="blk comp"/>
  <text x="610" y="582" text-anchor="middle" font-size="12" class="lbl">fc_mac (u_fc)</text>
  <text x="610" y="599" text-anchor="middle" class="sub">32-bit acc + int32 bias · argmax</text>
  <rect x="810" y="560" width="380" height="52" class="blk ctrl"/>
  <text x="1000" y="582" text-anchor="middle" font-size="12" class="lbl">core_lsu_arbiter</text>
  <text x="1000" y="599" text-anchor="middle" class="sub">4 lanes → 1 main_memory read/write port</text>

  <text x="619" y="640" text-anchor="middle" class="sub">thread 0 pushes the 9-pixel conv window / FC operands; results return to the registers via the writeback mux</text>

  <!-- wires: program_memory -> decoder -->
  <path class="wire" d="M480,128 L480,140 L909,140 L909,188"/>
  <text x="700" y="135" text-anchor="middle" class="sub">instruction</text>

  <!-- wire: main_memory <-> arbiter -->
  <path class="wire" d="M1050,128 L1050,140 L1196,140 L1196,548 L1000,548 L1000,560"/>
  <text x="1196" y="135" text-anchor="middle" class="sub"> </text>
</svg>
