<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1080" viewBox="0 0 1500 1080" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa3b2"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5ad28a"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b7bd6"/>
    </marker>
  </defs>

  <style>
    .lbl   { fill:#e6e9ef; }
    .sub   { fill:#8b93a7; font-size:11px; }
    .title { fill:#e6e9ef; font-size:22px; font-weight:700; }
    .grp   { font-size:12px; font-weight:600; letter-spacing:.04em; }
    .net   { stroke:#9aa3b2; stroke-width:1.6; fill:none; }
    .netG  { stroke:#5ad28a; stroke-width:1.6; fill:none; }
    .netB  { stroke:#5b7bd6; stroke-width:1.6; fill:none; }
    .name  { font-size:14px; font-weight:600; }
    .pin   { font-size:10.5px; fill:#aeb6c6; }
    text   { dominant-baseline:middle; }
  </style>

  <rect x="0" y="0" width="1500" height="1080" fill="#0b0d12"/>
  <text x="40" y="38" class="title">tiny-gpu - chip architecture</text>
  <text x="40" y="60" class="sub">SIMT GPU core (SystemVerilog) | Tang Nano 20K / GW2AR-18C | 27 MHz | runs an MNIST CNN end-to-end on-chip</text>

  <!-- ===================== HOST / IO COLUMN ===================== -->
  <g text-anchor="middle">
    <rect x="40" y="96" width="190" height="50" rx="9" fill="#161b27" stroke="#39414f"/>
    <text x="135" y="115" class="name lbl">Host PC</text>
    <text x="135" y="132" class="sub">UART 115200 | 784-byte image</text>

    <rect x="40" y="196" width="190" height="50" rx="9" fill="#13202a" stroke="#2f5b66"/>
    <text x="135" y="214" class="name lbl">uart_rx</text>
    <text x="135" y="231" class="sub">deserialize byte stream</text>

    <rect x="40" y="276" width="190" height="50" rx="9" fill="#13202a" stroke="#2f5b66"/>
    <text x="135" y="294" class="name lbl">dma_controller</text>
    <text x="135" y="311" class="sub">stream bytes to BRAM, arm GPU</text>

    <rect x="40" y="356" width="190" height="62" rx="9" fill="#13202a" stroke="#2f5b66"/>
    <text x="135" y="376" class="name lbl">main_memory</text>
    <text x="135" y="393" class="sub">8 KB dual-port BRAM</text>
    <text x="135" y="407" class="sub">DMA writes | GPU reads/writes</text>

    <rect x="40" y="556" width="190" height="50" rx="9" fill="#13202a" stroke="#2f5b66"/>
    <text x="135" y="574" class="name lbl">uart_tx</text>
    <text x="135" y="591" class="sub">emit predicted digit to host</text>

    <rect x="40" y="636" width="190" height="46" rx="9" fill="#161b27" stroke="#39414f"/>
    <text x="135" y="659" class="name lbl">LEDs [5:0]</text>
  </g>
  <text x="135" y="500" class="grp" fill="#6f7891" text-anchor="middle">data_pipeline.sv</text>
  <rect x="26" y="180" width="218" height="248" rx="12" fill="none" stroke="#2f5b66" stroke-dasharray="4 4" opacity="0.7"/>

  <!-- host/io nets -->
  <path class="net" d="M135,146 V196" marker-end="url(#arrow)"/>
  <path class="net" d="M135,246 V276" marker-end="url(#arrow)"/>
  <path class="net" d="M135,326 V356" marker-end="url(#arrow)"/>

  <!-- ===================== GPU ===================== -->
  <rect x="290" y="90" width="1180" height="930" rx="16" fill="#0e1830" stroke="#2563eb" stroke-width="2"/>
  <text x="312" y="114" class="grp" fill="#6f9bff">GPU | gpu.sv</text>

  <!-- dispatcher + ROM -->
  <g text-anchor="middle">
    <rect x="320" y="132" width="240" height="60" rx="9" fill="#221833" stroke="#7c5cff"/>
    <text x="440" y="152" class="name lbl">dispatcher</text>
    <text x="440" y="170" class="sub">block scheduling -&gt; core start/id</text>

    <rect x="600" y="132" width="260" height="60" rx="9" fill="#221833" stroke="#7c5cff"/>
    <text x="730" y="152" class="name lbl">program_memory (ROM)</text>
    <text x="730" y="170" class="sub">256 x 16-bit instructions</text>
  </g>

  <!-- ============ COMPUTE CORE 0 ============ -->
  <rect x="318" y="214" width="1132" height="690" rx="14" fill="#0c1426" stroke="#3f6ad8"/>
  <text x="338" y="236" class="grp" fill="#7fa0ff">Compute Core 0 | core.sv - SIMT, 4 threads / block</text>

  <!-- control plane -->
  <g text-anchor="middle">
    <rect x="340" y="262" width="220" height="66" rx="9" fill="#1d2740" stroke="#5b7bd6"/>
    <text x="450" y="283" class="name lbl">decoder</text>
    <text x="450" y="300" class="sub">16-bit instr -&gt;</text>
    <text x="450" y="314" class="sub">control signals</text>

    <rect x="340" y="350" width="220" height="78" rx="9" fill="#1d2740" stroke="#5b7bd6"/>
    <text x="450" y="370" class="name lbl">scheduler (FSM)</text>
    <text x="450" y="388" class="sub">FETCH | DECODE | REQUEST</text>
    <text x="450" y="402" class="sub">WAIT | EXECUTE | UPDATE</text>
    <text x="450" y="416" class="sub">-&gt; core_state / done</text>

    <rect x="340" y="452" width="220" height="66" rx="9" fill="#1d2740" stroke="#5b7bd6"/>
    <text x="450" y="473" class="name lbl">lsu_arbiter</text>
    <text x="450" y="490" class="sub">4 -&gt; 1 memory</text>
    <text x="450" y="504" class="sub">read port</text>
  </g>
  <text x="450" y="252" class="grp" fill="#6f7891" text-anchor="middle">control plane</text>

  <!-- coprocessors -->
  <g text-anchor="middle">
    <rect x="1190" y="262" width="232" height="78" rx="9" fill="#2a2113" stroke="#e0a23b"/>
    <text x="1306" y="282" class="name lbl">mac_array_3x3</text>
    <text x="1306" y="300" class="sub">3x3 conv MAC | DSP</text>
    <text x="1306" y="314" class="sub">baked weights</text>
    <text x="1306" y="328" class="sub">(shared, thread 0)</text>

    <rect x="1190" y="360" width="232" height="84" rx="9" fill="#2a2113" stroke="#e0a23b"/>
    <text x="1306" y="380" class="name lbl">fc_mac</text>
    <text x="1306" y="398" class="sub">FC layer: 32-bit acc</text>
    <text x="1306" y="412" class="sub">+ int32 bias | argmax</text>
    <text x="1306" y="426" class="sub">(shared, thread 0)</text>

    <rect x="1206" y="466" width="200" height="46" rx="9" fill="#1a1726" stroke="#8a7bb8"/>
    <text x="1306" y="485" class="name lbl" font-size="12">writeback mux</text>
    <text x="1306" y="500" class="sub">fc_read ? fc : conv</text>
  </g>
  <text x="1306" y="250" class="grp" fill="#6f7891" text-anchor="middle">coprocessors (tensor-core-like)</text>

  <!-- thread lanes (SIMT) -->
  <text x="870" y="250" class="grp" fill="#6f7891" text-anchor="middle">thread lanes x 4  (SIMT datapath)</text>
  <g>
    <!-- lane 0 (detailed) -->
    <g text-anchor="middle">
      <rect x="600" y="262" width="560" height="142" rx="10" fill="#10231a" stroke="#3f8c5e"/>
      <text x="618" y="280" class="pin" text-anchor="start" fill="#7fd6a0">lane 0</text>
      <rect x="620" y="292" width="118" height="98" rx="8" fill="#13301f" stroke="#5ad28a"/>
      <text x="679" y="332" class="name lbl">registers</text>
      <text x="679" y="350" class="sub">R0-R7</text>
      <text x="679" y="364" class="sub">R13-R15 IDs</text>
      <rect x="752" y="292" width="118" height="98" rx="8" fill="#13301f" stroke="#5ad28a"/>
      <text x="811" y="338" class="name lbl">alu</text>
      <text x="811" y="356" class="sub">add/sub/mul/shift</text>
      <rect x="884" y="292" width="118" height="98" rx="8" fill="#13301f" stroke="#5ad28a"/>
      <text x="943" y="332" class="name lbl">lsu</text>
      <text x="943" y="350" class="sub">rbase/wbase</text>
      <text x="943" y="364" class="sub">+ offset</text>
      <rect x="1016" y="292" width="118" height="98" rx="8" fill="#13301f" stroke="#5ad28a"/>
      <text x="1075" y="338" class="name lbl">pc</text>
      <text x="1075" y="356" class="sub">NZP branch</text>
    </g>
    <!-- lanes 1-3 (compact) -->
    <g text-anchor="middle">
      <rect x="600" y="416" width="560" height="44" rx="9" fill="#10231a" stroke="#3f8c5e"/>
      <text x="618" y="438" class="pin" text-anchor="start" fill="#7fd6a0">lane 1</text>
      <text x="679" y="438" class="lbl" font-size="12.5">registers</text>
      <text x="811" y="438" class="lbl" font-size="12.5">alu</text>
      <text x="943" y="438" class="lbl" font-size="12.5">lsu</text>
      <text x="1075" y="438" class="lbl" font-size="12.5">pc</text>

      <rect x="600" y="470" width="560" height="44" rx="9" fill="#10231a" stroke="#3f8c5e"/>
      <text x="618" y="492" class="pin" text-anchor="start" fill="#7fd6a0">lane 2</text>
      <text x="679" y="492" class="lbl" font-size="12.5">registers</text>
      <text x="811" y="492" class="lbl" font-size="12.5">alu</text>
      <text x="943" y="492" class="lbl" font-size="12.5">lsu</text>
      <text x="1075" y="492" class="lbl" font-size="12.5">pc</text>

      <rect x="600" y="524" width="560" height="44" rx="9" fill="#10231a" stroke="#3f8c5e"/>
      <text x="618" y="546" class="pin" text-anchor="start" fill="#7fd6a0">lane 3</text>
      <text x="679" y="546" class="lbl" font-size="12.5">registers</text>
      <text x="811" y="546" class="lbl" font-size="12.5">alu</text>
      <text x="943" y="546" class="lbl" font-size="12.5">lsu</text>
      <text x="1075" y="546" class="lbl" font-size="12.5">pc</text>
    </g>
  </g>

  <!-- core_state broadcast bar -->
  <path class="netB" d="M450,428 V612 H1134" marker-end="url(#arrowB)"/>
  <text x="470" y="606" class="pin" text-anchor="start" fill="#7fa0ff">core_state broadcast -&gt; lanes / coprocessors</text>

  <!-- decoder control fan-out -->
  <path class="netB" d="M560,288 H600" marker-end="url(#arrowB)"/>
  <text x="566" y="278" class="pin" text-anchor="start" fill="#7fa0ff">control bus</text>
  <path class="netB" d="M560,310 H1175 V300 H1190" marker-end="url(#arrowB)" opacity="0.85"/>

  <!-- decoder -> scheduler -->
  <path class="netB" d="M450,328 V350" marker-end="url(#arrowB)"/>

  <!-- ROM <-> core (PC up, instr down) -->
  <path class="net" d="M1075,292 V210 H760 V192" marker-end="url(#arrow)"/>
  <text x="780" y="204" class="pin" text-anchor="start">PC -&gt; ROM addr</text>
  <path class="net" d="M700,192 V222 H472 V262" marker-end="url(#arrow)"/>
  <text x="600" y="206" class="pin" text-anchor="start">instruction -&gt; decoder</text>

  <!-- dispatcher -> core -->
  <path class="net" d="M440,192 V214" marker-end="url(#arrow)"/>
  <text x="446" y="206" class="pin" text-anchor="start">start / block_id</text>

  <!-- lanes -> arbiter -> memory -->
  <path class="netG" d="M620,341 H570 V452" marker-end="url(#arrowG)"/>
  <text x="540" y="430" class="pin" text-anchor="start" fill="#7fd6a0">mem req x4</text>
  <path class="netG" d="M340,486 H236" marker-end="url(#arrowG)"/>
  <text x="250" y="476" class="pin" text-anchor="start" fill="#7fd6a0">mem_raddr</text>
  <path class="net" d="M236,398 H300 V470 H340" marker-end="url(#arrow)"/>
  <text x="250" y="452" class="pin" text-anchor="start">mem_rdata</text>

  <!-- coprocessor writeback to registers -->
  <path class="netG" d="M1306,512 V560 H1190 V341 H1134" marker-end="url(#arrowG)"/>
  <text x="1150" y="555" class="pin" text-anchor="end" fill="#e0a23b">MAC/FC writeback -&gt; registers</text>

  <!-- store + emit out of core -->
  <path class="netG" d="M943,390 V760 H236 V418" marker-end="url(#arrowG)"/>
  <text x="250" y="746" class="pin" text-anchor="start" fill="#7fd6a0">thread 0: STR -&gt; mem_we/waddr/wdata</text>
  <path class="netG" d="M1075,390 V792 H135 V606" marker-end="url(#arrowG)"/>
  <text x="150" y="780" class="pin" text-anchor="start" fill="#7fd6a0">thread 0: emit -&gt; uart_tx</text>

  <!-- gpu_start / done between dma and gpu -->
  <path class="net" d="M230,300 H262 V946 H440 V904" marker-end="url(#arrow)"/>
  <text x="300" y="938" class="pin" text-anchor="start">gpu_start (payload ready)</text>
  <path class="net" d="M470,904 V966 H210 V326" marker-end="url(#arrow)"/>
  <text x="300" y="958" class="pin" text-anchor="start">done -&gt; re-arm DMA</text>

  <!-- ============ COMPUTE CORE 1 ============ -->
  <rect x="318" y="924" width="360" height="72" rx="12" fill="#0c1426" stroke="#37455f" stroke-dasharray="5 4"/>
  <text x="498" y="950" class="name lbl" text-anchor="middle">Compute Core 1 (core.sv)</text>
  <text x="498" y="970" class="sub" text-anchor="middle">instantiated | ROM/mem ports tied off (single-core build)</text>

  <!-- ===================== LEGEND ===================== -->
  <g transform="translate(720,930)">
    <rect x="0" y="0" width="730" height="86" rx="10" fill="#0e1422" stroke="#27303f"/>
    <text x="16" y="20" class="grp" fill="#8b93a7">legend</text>
    <rect x="16" y="34" width="16" height="16" rx="3" fill="#221833" stroke="#7c5cff"/>
    <text x="40" y="43" class="sub" text-anchor="start">GPU front-end (dispatch / fetch)</text>
    <rect x="16" y="58" width="16" height="16" rx="3" fill="#1d2740" stroke="#5b7bd6"/>
    <text x="40" y="67" class="sub" text-anchor="start">control plane (decode / schedule / arbitrate)</text>
    <rect x="300" y="34" width="16" height="16" rx="3" fill="#13301f" stroke="#5ad28a"/>
    <text x="324" y="43" class="sub" text-anchor="start">SIMT compute lanes (regs/alu/lsu/pc)</text>
    <rect x="300" y="58" width="16" height="16" rx="3" fill="#2a2113" stroke="#e0a23b"/>
    <text x="324" y="67" class="sub" text-anchor="start">MAC coprocessors (conv + FC)</text>
    <rect x="560" y="34" width="16" height="16" rx="3" fill="#13202a" stroke="#2f5b66"/>
    <text x="584" y="43" class="sub" text-anchor="start">host I/O + memory</text>
    <line x1="560" y1="66" x2="584" y2="66" class="netG"/>
    <text x="592" y="67" class="sub" text-anchor="start">data / control flow</text>
  </g>
</svg>
